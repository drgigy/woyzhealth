<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOYZ Demo Requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #111111;
    --secondary: #64748B;
    --accent: #2563EB;
    --bg: #F8FAFC;
    --card: #FFFFFF;
    --border: #E2E8F0;
    --danger: #B91C1C;
    --success: #047857;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--primary);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: #0A0A0A;
    color: #fff;
    padding: 22px 24px;
  }
  .header-inner {
    max-width: 1120px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .logo {
    font-size: 20px;
    font-weight: 800;
    text-decoration: none;
    color: #fff;
  }
  .logo span { color: var(--accent); }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 14px;
    color: #94A3B8;
    font-size: 13px;
  }
  button {
    font: inherit;
    border: none;
    cursor: pointer;
  }
  .btn {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    background: var(--accent);
    color: #fff;
    padding: 11px 18px;
    border-radius: 10px;
    font-weight: 700;
    text-decoration: none;
  }
  .btn.secondary {
    background: #fff;
    color: var(--primary);
    border: 1px solid var(--border);
  }
  main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 12px 38px rgba(15, 23, 42, 0.06);
  }
  .login-card {
    max-width: 460px;
    margin: 60px auto;
    padding: 34px;
  }
  .eyebrow {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(32px, 4vw, 48px);
    letter-spacing: -1.5px;
    margin-bottom: 10px;
  }
  .sub {
    color: var(--secondary);
    line-height: 1.7;
    margin-bottom: 26px;
  }
  form {
    display: grid;
    gap: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 7px;
  }
  input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 13px;
    font: inherit;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
  }
  .status {
    display: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.5;
  }
  .status.error {
    display: block;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: var(--danger);
  }
  .status.success {
    display: block;
    background: #ECFDF5;
    border: 1px solid #A7F3D0;
    color: var(--success);
  }
  .hidden { display: none !important; }
  .dashboard-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    margin-bottom: 24px;
  }
  .count {
    color: var(--secondary);
    font-size: 14px;
    margin-top: 8px;
  }
  .requests {
    display: grid;
    gap: 16px;
  }
  .request-card {
    padding: 24px;
  }
  .request-top {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 18px;
  }
  .request-name {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 5px;
  }
  .request-date {
    color: var(--secondary);
    font-size: 13px;
    white-space: nowrap;
  }
  .badge {
    display: inline-block;
    background: #EFF6FF;
    color: var(--accent);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }
  .detail-label {
    color: var(--secondary);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-value {
    color: var(--primary);
    font-size: 14px;
    overflow-wrap: anywhere;
  }
  .detail-value a {
    color: var(--accent);
    text-decoration: none;
  }
  .message {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    color: #334155;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .empty {
    padding: 34px;
    text-align: center;
    color: var(--secondary);
  }
  @media (max-width: 760px) {
    .header-inner, .dashboard-head, .request-top {
      flex-direction: column;
      align-items: flex-start;
    }
    .details {
      grid-template-columns: 1fr;
    }
    main {
      padding: 32px 18px 60px;
    }
    .login-card {
      margin: 24px auto;
      padding: 24px;
    }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="./">WOYZ<span>.</span>health</a>
    <div class="header-actions hidden" id="account-bar">
      <span id="account-email"></span>
      <button class="btn secondary" id="logout-button" type="button">Sign out</button>
    </div>
  </div>
</header>

<main>
  <section class="card login-card" id="login-view">
    <div class="eyebrow">Admin Login</div>
    <h1>Demo Requests</h1>
    <p class="sub">Sign in with the Firebase admin account you created to view new Book a Demo submissions.</p>
    <form id="login-form">
      <div>
        <label for="admin-email">Email address</label>
        <input id="admin-email" name="email" type="email" autocomplete="email" required>
      </div>
      <div>
        <label for="admin-password">Password</label>
        <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Sign in</button>
      <p class="status" id="login-status" aria-live="polite"></p>
    </form>
  </section>

  <section class="hidden" id="dashboard-view">
    <div class="dashboard-head">
      <div>
        <div class="eyebrow">Admin Dashboard</div>
        <h1>Demo Requests</h1>
        <p class="count" id="request-count">Loading requests...</p>
      </div>
      <a class="btn secondary" href="./">Back to website</a>
    </div>
    <div class="requests" id="requests"></div>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC8XIxRIMpVLkMioaohwuBCyGZVtVawwYs",
    authDomain: "woyz-health-demo-request.firebaseapp.com",
    projectId: "woyz-health-demo-request",
    storageBucket: "woyz-health-demo-request.firebasestorage.app",
    messagingSenderId: "783719100742",
    appId: "1:783719100742:web:8f1ae53c7e72af92bff547"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginView = document.getElementById('login-view');
  const dashboardView = document.getElementById('dashboard-view');
  const loginForm = document.getElementById('login-form');
  const loginStatus = document.getElementById('login-status');
  const accountBar = document.getElementById('account-bar');
  const accountEmail = document.getElementById('account-email');
  const logoutButton = document.getElementById('logout-button');
  const requestCount = document.getElementById('request-count');
  const requests = document.getElementById('requests');
  let unsubscribeRequests = null;

  function formatDate(timestamp) {
    if (!timestamp || !timestamp.toDate) return 'Just now';
    return timestamp.toDate().toLocaleString('en-IN', {
      dateStyle: 'medium',
      timeStyle: 'short'
    });
  }

  function safeText(value) {
    return value && String(value).trim() ? String(value).trim() : 'Not provided';
  }

  function escapeHtml(value) {
    return safeText(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function renderRequests(snapshot) {
    const docs = snapshot.docs;
    requestCount.textContent = `${docs.length} request${docs.length === 1 ? '' : 's'}`;

    if (!docs.length) {
      requests.innerHTML = '<div class="card empty">No demo requests yet.</div>';
      return;
    }

    requests.innerHTML = docs.map((doc) => {
      const data = doc.data();
      const email = escapeHtml(data.email);
      const mobile = escapeHtml(data.mobile);
      const message = escapeHtml(data.message);
      return `
        <article class="card request-card">
          <div class="request-top">
            <div>
              <div class="request-name">${escapeHtml(data.name)}</div>
              <span class="badge">${escapeHtml(data.status || 'new')}</span>
            </div>
            <div class="request-date">${formatDate(data.submittedAt)}</div>
          </div>
          <div class="details">
            <div>
              <div class="detail-label">Email</div>
              <div class="detail-value"><a href="mailto:${email}">${email}</a></div>
            </div>
            <div>
              <div class="detail-label">Mobile</div>
              <div class="detail-value"><a href="tel:${mobile}">${mobile}</a></div>
            </div>
            <div>
              <div class="detail-label">Specialty</div>
              <div class="detail-value">${escapeHtml(data.specialty)}</div>
            </div>
          </div>
          <div class="message">${message}</div>
        </article>
      `;
    }).join('');
  }

  function startRequestListener() {
    if (unsubscribeRequests) unsubscribeRequests();
    const requestsQuery = query(collection(db, 'demoRequests'), orderBy('submittedAt', 'desc'));
    unsubscribeRequests = onSnapshot(requestsQuery, renderRequests, () => {
      requests.innerHTML = '<div class="card empty">Unable to load requests. Check your Firestore security rules.</div>';
      requestCount.textContent = 'Could not load requests';
    });
  }

  loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    loginStatus.textContent = '';
    loginStatus.className = 'status';
    const formData = new FormData(loginForm);

    try {
      await signInWithEmailAndPassword(auth, formData.get('email'), formData.get('password'));
      loginForm.reset();
    } catch (error) {
      loginStatus.textContent = 'Login failed. Please check the email and password.';
      loginStatus.className = 'status error';
    }
  });

  logoutButton.addEventListener('click', async () => {
    await signOut(auth);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      accountBar.classList.remove('hidden');
      accountEmail.textContent = user.email;
      startRequestListener();
    } else {
      if (unsubscribeRequests) unsubscribeRequests();
      loginView.classList.remove('hidden');
      dashboardView.classList.add('hidden');
      accountBar.classList.add('hidden');
      accountEmail.textContent = '';
      requests.innerHTML = '';
      requestCount.textContent = 'Loading requests...';
    }
  });
</script>
</body>
</html>
